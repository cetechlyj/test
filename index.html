<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 관리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 36px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a2e4a;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #8a9bb0;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d0dae6;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #3b7de8;
    }

    button.add-btn {
      padding: 10px 18px;
      background: #3b7de8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: #2c63c5; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1.5px solid #d0dae6;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #5a7090;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #3b7de8;
      border-color: #3b7de8;
      color: #fff;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid #e8eef5;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover { background: #f7faff; }

    li.done {
      opacity: 0.5;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #3b7de8;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1a2e4a;
    }

    li.done .todo-text {
      text-decoration: line-through;
      color: #aab;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #c0cdd8;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .delete-btn:hover {
      color: #e05050;
      background: #fff0f0;
    }

    .summary {
      margin-top: 20px;
      font-size: 0.82rem;
      color: #8a9bb0;
      text-align: right;
    }

    .empty {
      text-align: center;
      color: #b0bec8;
      padding: 32px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 할 일 관리</h1>
    <p class="subtitle">오늘의 할 일을 추가하고 관리하세요</p>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="할 일 입력..." />
      <button class="add-btn" onclick="addTodo()">추가</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <ul id="todoList"></ul>
    <div class="empty" id="emptyMsg" style="display:none">할 일이 없습니다 🎉</div>

    <div class="summary" id="summary"></div>
  </div>

  <script>
    let todos = [];
    let currentFilter = 'all';
    let nextId = 1;

    const input = document.getElementById('todoInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: nextId++, text, done: false });
      input.value = '';
      render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      render();
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const emptyMsg = document.getElementById('emptyMsg');
      const summary = document.getElementById('summary');

      const filtered = todos.filter(t => {
        if (currentFilter === 'active') return !t.done;
        if (currentFilter === 'done') return t.done;
        return true;
      });

      list.innerHTML = '';
      filtered.forEach(todo => {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');
        li.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${todo.id})" />
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})">✕</button>
        `;
        list.appendChild(li);
      });

      emptyMsg.style.display = filtered.length === 0 ? 'block' : 'none';

      const total = todos.length;
      const done = todos.filter(t => t.done).length;
      summary.textContent = total > 0 ? `완료 ${done} / 전체 ${total}` : '';
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
